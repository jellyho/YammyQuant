name: tests

on:
  push:
    branches: [master]
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    paths-ignore: ["**.md", "docs/**"]

# cancel an in-progress run when a newer commit arrives on the same ref
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Ruff
        run: ruff check .

  test:
    # the full suite gates every PR (the exact diff); the squash-merge to master
    # is that same diff, so we skip the redundant master-push re-run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install fastapi 'uvicorn[standard]' httpx gymnasium
      - name: Run tests
        run: pytest -q
